<!DOCTYPE html>
<html>
    <head>
        <title>Youtube.com Clone</title>
        <style>
            .thumbnail{
                width:200px;
                height: 200px;
                object-fit: cover;
                border-radius: 100px;
            }
           
            .search-bar{
                padding: 5px 12px;
                border-radius:5px;
                border-style: solid;
                border-color: rgb(225, 223, 223);
            }

            .search{
                margin-top: 10px;
                width: 300px;
                border-radius: 20px;
                border-style:solid;
                border-color: rgb(225, 223, 223);
                padding: 8px 12px;
            }
        </style>
    </head>
    <body>
        <img class="thumbnail" src="thumbnails/thumbnail-1.webp">
        <input class="search-bar" type="text" placeholder="Search">
        <input class="search" type="text" placeholder="Search Google or type a URL">
        <input type="text">
    </body>
</html>
